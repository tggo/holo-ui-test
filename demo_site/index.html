<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Demo Shop</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #f5f5f7; color: #1d1d1f; }
  header { background: #1d1d1f; color: #fff; padding: 18px 32px; font-size: 20px; font-weight: 600; }
  .bar { display: flex; gap: 12px; padding: 28px 32px; align-items: center; }
  input[type=text] { width: 360px; padding: 12px 14px; font-size: 16px;
    border: 1px solid #c7c7cc; border-radius: 10px; }
  button { padding: 12px 22px; font-size: 16px; font-weight: 600; color: #fff;
    background: #0071e3; border: none; border-radius: 10px; cursor: pointer; }
  button:hover { background: #0077ed; }
  #results { padding: 0 32px 40px; font-size: 18px; }
  .card { background: #fff; border-radius: 12px; padding: 18px 20px; margin-top: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); }
</style>
</head>
<body>
  <header>Demo Shop</header>
  <div class="bar">
    <input type="text" id="q" placeholder="Search products…" autocomplete="off">
    <button id="go" onclick="search()">Search</button>
  </div>
  <div id="results"></div>
  <script>
    function search() {
      const q = document.getElementById('q').value.trim();
      const r = document.getElementById('results');
      if (!q) { r.innerHTML = ''; return; }
      r.innerHTML = '<div class="card">Results for: ' + q +
        '<br><br>1. ' + q + ' — Pro model<br>2. ' + q + ' — Lite model</div>';
    }
    document.getElementById('q').addEventListener('keydown',
      e => { if (e.key === 'Enter') search(); });
  </script>
</body>
</html>
